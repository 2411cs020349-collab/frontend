    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Complex Table Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    .table-container {
      max-width: 100%;
      overflow-x: auto;
    }

    table {
      border-collapse: collapse;
      wzm44444444444444444idth: 100%;
      min-width: 800px;
    }

    thead tr {
      background-color: #333;
      color: white;
    }

    th, td {
      padding: 12px 16px;
      border: 1px solid #ddd;
      text-align: left;
    }

    tbody tr:nth-child(odd) {
      background-color: #f9f9f9;
    }

    tbody tr:nth-child(even) {
      background-color: #fff;
    }

    th.sortable:hover {
      cursor: pointer;
      background-color: #555;
    }

    th.sortable::after {
      content: " ⬍";
      font-size: 0.8em;
    }
  </style>
</head>
<body>

  <h2>Complex Table with Multi-Level Headers and Sorting</h2>

  <div class="table-container">
    <table id="complexTable">
      <thead>
        <tr>
          <th rowspan="2" class="sortable">Name</th>
          <th colspan="2">Contact</th>
          <th colspan="2">Performance</th>
        </tr>
        <tr>
          <th class="sortable">Email</th>
          <th class="sortable">Phone</th>
          <th class="sortable">Score</th>
          <th class="sortable">Rank</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Alice Johnson</td>
          <td>alice@example.com</td>
          <td>123-456-7890</td>
          <td>87</td>
          <td>3</td>
        </tr>
        <tr>
          <td>Bob Smith</td>
          <td>bob@example.com</td>
          <td>987-654-3210</td>
          <td>91</td>
          <td>2</td>
        </tr>
        <tr>
          <td>Clara Lopez</td>
          <td>clara@example.com</td>
          <td>555-666-7777</td>
          <td>95</td>
          <td>1</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    document.querySelectorAll('th.sortable').forEach((header, index) => {
      header.addEventListener('click', () => {
        sortTableByColumn(document.getElementById('complexTable'), index);
      });
    });

    function sortTableByColumn(table, column, asc = true) {
      const dirModifier = asc ? 1 : -1;
      const tBody = table.tBodies[0];
      const rows = Array.from(tBody.querySelectorAll("tr"));

      const sortedRows = rows.sort((a, b) => {
        const aText = a.children[column].textContent.trim();
        const bText = b.children[column].textContent.trim();
        return aText.localeCompare(bText, undefined, { numeric: true }) * dirModifier;
      });

      // Remove all rows
      while (tBody.firstChild) {
        tBody.removeChild(tBody.firstChild);
      }

      // Re-add sorted rows
      tBody.append(...sortedRows);

      // Toggle the direction for next click
      Array.from(table.querySelectorAll("th")).forEach(th => th.classList.remove("asc", "desc"));
      table.querySelectorAll("th")[column].classList.toggle("asc", asc);
      table.querySelectorAll("th")[column].classList.toggle("desc", !asc);
    }
  </script>

</body>
</html>

</body>
</html>
